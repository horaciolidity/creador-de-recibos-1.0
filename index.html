<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Factura Profesional - Agencia de Viajes</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#eef2f7;
    margin:0;
    padding:20px;
}

.card{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#003366;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    width:100%;
    box-sizing:border-box;
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#003366;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004e9f;
}

#qrcode{
    display:none;
}
</style>
</head>
<body>

<div class="card">

<h1>Factura / Recibo Profesional</h1>

<div class="grid">
<input id="empresa" placeholder="Nombre Agencia">
<input id="cuit" placeholder="CUIT">

<input id="factura" placeholder="Factura Nº">
<input id="fecha" type="date">

<input id="cliente" placeholder="Cliente">
<input id="documento" placeholder="DNI/Pasaporte">

<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">

<input id="servicio" placeholder="Servicio">
<input id="monto" placeholder="Monto">

</div>

<button onclick="generarPDF()">
Descargar PDF Profesional
</button>

<div id="qrcode"></div>

</div>

<script>

async function generarPDF(){

const { jsPDF } = window.jspdf;
const pdf = new jsPDF();

const empresa=document.getElementById("empresa").value;
const cuit=document.getElementById("cuit").value;
const factura=document.getElementById("factura").value;
const fecha=document.getElementById("fecha").value;
const cliente=document.getElementById("cliente").value;
const documento=document.getElementById("documento").value;
const origen=document.getElementById("origen").value;
const destino=document.getElementById("destino").value;
const servicio=document.getElementById("servicio").value;
const monto=document.getElementById("monto").value;

const qrContainer=document.getElementById("qrcode");
qrContainer.innerHTML="";

new QRCode(qrContainer,{
text:`Factura:${factura}|Cliente:${cliente}|Monto:${monto}`,
width:120,
height:120
});

await new Promise(r=>setTimeout(r,500));

const qrImg=qrContainer.querySelector("img");

pdf.setFont("helvetica","bold");
pdf.setFontSize(26);
pdf.text(empresa || "AGENCIA DE VIAJES",20,20);

pdf.setFontSize(12);
pdf.text("FACTURA / RECIBO",150,20);

pdf.setDrawColor(0);
pdf.line(20,28,190,28);

pdf.setTextColor(220,220,220);
pdf.setFontSize(48);
pdf.text("PAGADO",50,180,{angle:45});

pdf.setTextColor(0,0,0);

pdf.setFontSize(12);

pdf.text(`CUIT: ${cuit}`,20,40);
pdf.text(`Factura Nº: ${factura}`,130,40);

pdf.text(`Fecha: ${fecha}`,20,50);

pdf.setFillColor(240,240,240);
pdf.rect(20,60,170,28,"F");

pdf.text(`Cliente: ${cliente}`,25,72);
pdf.text(`Documento: ${documento}`,25,82);

pdf.setFont("helvetica","bold");

pdf.rect(20,100,170,10);
pdf.text("Detalle del Servicio",25,107);

pdf.rect(20,110,120,20);
pdf.rect(140,110,50,20);

pdf.setFont("helvetica","normal");

pdf.text(
`${servicio}
${origen} → ${destino}`,
25,
118
);

pdf.text(`$ ${monto}`,155,120);

pdf.setFont("helvetica","bold");
pdf.setFontSize(16);

pdf.rect(120,145,70,15);

pdf.text(
`TOTAL $ ${monto}`,
128,
155
);

if(qrImg){

pdf.addImage(
qrImg.src,
"PNG",
20,
150,
35,
35
);

pdf.setFontSize(8);
pdf.text(
"QR de validación",
20,
190
);
}

pdf.setFontSize(10);

pdf.text(
"Este comprobante acredita el pago del servicio turístico contratado.",
20,
210
);

pdf.line(130,240,185,240);
pdf.text("Firma y Sello",145,247);

pdf.save(`Factura_${factura || "0001"}.pdf`);

}
</script>

</body>
</html>
